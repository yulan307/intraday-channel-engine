# Phase 7 Live Paper startup defaults.
# Run without strategy arguments to use this file:
#   python -m single_day_test.application.live_cli
# Every explicitly supplied CLI option overrides its matching value below.
# Example:
#   python -m single_day_test.application.live_cli --symbol MSFT --threshold 150

# One US stock symbol and one signal direction for this run.
symbol: MU
direction: BUY

# A number selects Fixed Threshold; null selects Auto Threshold.
threshold: 950

# Auto signal updates: 0-100 percent. With a numeric threshold, a numeric rate
# enables Auto mode; null or omission keeps Fixed mode. Auto without a threshold
# remains enabled. A numeric 0 preserves signal-price updates.
threshold_update_rate: 3

# The selected row in the central parameter-set CSV. Phase 5 requires exactly one row.
parameter_set_path: configs/parameter_set_sample.csv
parameter_set_id: mu-phase3-v1

# Selects the paper or live connection profile from configs/ib.yaml.
# It changes the TWS endpoint. The operator is responsible for selecting paper/live.
ib_environment: paper

# Required order sizes. One normally returned placeOrder consumes one value.
shares: [1]

# Optional ET trading date in YYYY-MM-DD format.
# null selects today, or the next tradable session after today's close.
trade_date: null

# INFO writes startup-through-first-bar diagnostics; ERROR writes only errors and final summaries.
log_level: INFO
